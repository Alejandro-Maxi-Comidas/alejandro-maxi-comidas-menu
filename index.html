<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <!-- Configuración para la miniatura de WhatsApp (Open Graph) -->
    <meta property="og:title" content="Maxicomidas - Menú Digital">
    <meta property="og:description" content="Sabor casero y delivery. ¡Hace tu pedido online ahora!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1000&auto=format&fit=crop">
    <meta property="og:type" content="website">

    <title>Maxicomidas - Menú Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }

        .category-btn.active {
            background-color: #1d3557;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(29, 53, 87, 0.2);
        }

        .cart-drawer {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drawer-open { transform: translateY(0); }
        .drawer-closed { transform: translateY(100%); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .animate-slide-up {
            animation: slideUp 0.3s ease-out;
        }

        .payment-option:checked + label {
            border-color: #1d3557;
            background-color: #f0f4f8;
            color: #1d3557;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="bg-[#1d3557] text-white px-6 pt-6 pb-10 shadow-xl rounded-b-[2.5rem]">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight italic">MAXICOMIDAS</h1>
                    <p class="text-[11px] uppercase tracking-widest text-blue-200 font-bold">Sabor Casero & Delivery</p>
                </div>
                <a id="header-whatsapp" href="#" class="bg-[#25D366] w-12 h-12 rounded-full hover:bg-[#128C7E] transition-colors shadow-lg flex items-center justify-center shrink-0">
                    <i class="fab fa-whatsapp text-2xl"></i>
                </a>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mt-4">
                <div class="bg-white/10 rounded-2xl p-3 border border-white/5">
                    <p class="text-[9px] uppercase font-black text-blue-300 mb-1">Transferencias</p>
                    <p id="alias-display" class="text-xs font-bold truncate">---</p>
                </div>
                <div class="bg-white/10 rounded-2xl p-3 border border-white/5">
                    <p class="text-[9px] uppercase font-black text-red-300 mb-1">Horarios</p>
                    <p id="hours-display" class="text-xs font-bold">---</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Info Pill -->
    <div class="max-w-md mx-auto -mt-6 px-6 relative z-10">
        <div class="bg-white rounded-full shadow-lg py-2.5 px-4 flex justify-between items-center text-[10px] font-black text-gray-500 uppercase tracking-tight border border-gray-100">
            <span><i class="fas fa-motorcycle text-blue-500 mr-1"></i> Envío sin cargo</span>
            <span class="w-px h-3 bg-gray-200"></span>
            <span id="status-pill" class="text-red-500">Cargando...</span>
        </div>
    </div>

    <!-- Categorías -->
    <nav class="max-w-md mx-auto px-6 mt-3 overflow-x-auto no-scrollbar flex gap-3 py-2 sticky top-0 z-30 bg-[#f3f4f6]/80 backdrop-blur-md" id="category-nav">
        <!-- Rendered from Config -->
    </nav>

    <!-- Lista de Productos -->
    <main class="max-w-md mx-auto px-6 mt-2 pb-40 space-y-3" id="menu-grid">
        <!-- Render dinámico -->
    </main>

    <!-- Resumen Carrito Flotante -->
    <div id="cart-summary" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-[#1d3557] text-white rounded-[2rem] p-4 shadow-2xl flex items-center justify-between z-50 transform translate-y-32 transition-transform duration-500 cursor-pointer" onclick="toggleCartDrawer(true)">
        <div class="flex items-center gap-3">
            <div class="relative bg-white/10 p-2 rounded-xl">
                <i class="fas fa-shopping-basket text-xl"></i>
                <span id="cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-[#1d3557]">0</span>
            </div>
            <div>
                <p id="cart-text-qty" class="text-[10px] font-bold uppercase text-blue-200 tracking-wider">Ver mi pedido</p>
                <p id="cart-text-total" class="font-black text-lg leading-tight tracking-tighter">$0</p>
            </div>
        </div>
        <div class="bg-white/10 p-2 rounded-lg">
            <i class="fas fa-chevron-up text-xs"></i>
        </div>
    </div>

    <!-- Drawer Carrito -->
    <div id="cart-drawer-overlay" class="fixed inset-0 bg-black/40 z-[60] hidden backdrop-blur-sm" onclick="toggleCartDrawer(false)"></div>
    <div id="cart-drawer" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] z-[70] cart-drawer drawer-closed max-h-[92vh] overflow-hidden flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.2)]">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mt-4 mb-2"></div>
        
        <div class="px-6 py-4 flex justify-between items-center border-b border-gray-50">
            <h2 class="text-xl font-extrabold text-gray-800 tracking-tighter">Mi Pedido</h2>
            <button onclick="clearCart()" class="text-red-500 text-[10px] font-black uppercase tracking-widest bg-red-50 px-3 py-1 rounded-full">Vaciar</button>
        </div>

        <div id="cart-items-list" class="flex-1 overflow-y-auto px-6 py-4 space-y-3 no-scrollbar bg-gray-50/50"></div>

        <div class="px-6 py-4 bg-white border-t border-gray-100">
            <p class="text-[10px] font-black uppercase text-gray-400 mb-3 tracking-widest text-center">Seleccioná cómo vas a pagar:</p>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <input type="radio" name="payment" id="pay-cash" value="cash" class="hidden payment-option" checked onchange="updateUI()">
                    <label for="pay-cash" class="flex flex-col items-center justify-center p-3 border-2 border-gray-100 rounded-2xl cursor-pointer transition-all">
                        <i class="fas fa-money-bill-wave mb-1 text-xl"></i>
                        <span class="text-[10px] font-black uppercase">Efectivo</span>
                    </label>
                </div>
                <div>
                    <input type="radio" name="payment" id="pay-transfer" value="transfer" class="hidden payment-option" onchange="updateUI()">
                    <label for="pay-transfer" class="flex flex-col items-center justify-center p-3 border-2 border-gray-100 rounded-2xl cursor-pointer transition-all">
                        <i class="fas fa-university mb-1 text-xl"></i>
                        <span class="text-[10px] font-black uppercase">Transferencia</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 pt-0 space-y-3">
            <div class="flex justify-between items-center bg-[#1d3557] p-5 rounded-2xl text-white shadow-xl">
                <span class="font-black uppercase text-xs italic opacity-80">Total a pagar:</span>
                <span id="drawer-total-display" class="font-black text-2xl tracking-tighter">$0</span>
            </div>
            <button onclick="sendWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-transform">
                <i class="fab fa-whatsapp text-2xl"></i>
                ENVIAR POR WHATSAPP
            </button>
        </div>
    </div>

    <!-- Modal Guarniciones -->
    <div id="side-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl animate-slide-up">
            <div class="text-center mb-6">
                <div class="bg-orange-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-utensils text-2xl text-orange-500"></i>
                </div>
                <h3 class="text-xl font-black text-gray-800 tracking-tight">Elegí tu Guarnición</h3>
            </div>
            <div class="grid grid-cols-1 gap-2" id="sides-grid"></div>
            <button onclick="closeSideModal()" class="w-full mt-6 py-3 text-gray-300 font-black text-[10px] uppercase tracking-widest">Cerrar</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            whatsapp: "5491161850833",
            alias: "MAXI.COM.ALE",
            horarios: "Mar a Dom 11-15hs / 19-22:30hs",
            estado: "Lunes Cerrado",
            categorias: [
                { id: "todos", label: "Todos" },
                { id: "hoy", label: "Hoy" },
                { id: "pastas", label: "Pastas" },
                { id: "milanesas", label: "Milanesas" }
            ],
            guarniciones: ["Papas en cubos", "Papas Fritas", "Puré de Papas", "Puré de Calabaza", "Puré Mixto", "Arroz", "Ensalada"]
        };

        const menuData = [
            {"id":1,"name":"Guiso de lentejas","cat":"hoy","cash":13000,"mp":14000,"desc":"Guiso casero","side":false},
            {"id":2,"name":"Pastel de bondiola y batatas","cat":"hoy","cash":15000,"mp":16000,"desc":"Bondiola desmechada, puré batatas","side":false},
            {"id":3,"name":"Pollo al horno","cat":"hoy","cash":13000,"mp":14000,"desc":"Pollo al horno","side":true},
            {"id":4,"name":"Bife de costilla","cat":"hoy","cash":17000,"mp":19000,"desc":"A la plancha","side":true},
            {"id":5,"name":"Ribs de cerdo BBQ","cat":"hoy","cash":22000,"mp":24000,"desc":"Salsa barbacoa casera","side":true},
            {"id":6,"name":"Tallarines","cat":"pastas","cash":10000,"mp":11000,"desc":"Salsa rosa o pesto","side":false},
            {"id":7,"name":"Milanesa de ternera","cat":"milanesas","cash":14000,"mp":15000,"desc":"Milanesa de ternera","side":true},
            {"id":8,"name":"Suprema de pollo","cat":"milanesas","cash":14000,"mp":15000,"desc":"Suprema de pollo","side":true}
        ];

        let cart = [];
        let pendingItem = null;

        function initApp() {
            document.getElementById('alias-display').innerText = `Alias: ${CONFIG.alias}`;
            document.getElementById('hours-display').innerText = CONFIG.horarios;
            document.getElementById('status-pill').innerText = CONFIG.estado;
            document.getElementById('header-whatsapp').href = `https://wa.me/${CONFIG.whatsapp}?text=Hola!%20Tengo%20una%20consulta`;
            
            const nav = document.getElementById('category-nav');
            CONFIG.categorias.forEach((cat, idx) => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${idx === 0 ? 'active' : ''} px-6 py-2 rounded-full bg-white text-gray-600 font-bold text-sm shadow-sm border border-gray-100 whitespace-nowrap transition-all`;
                btn.innerText = cat.label;
                btn.onclick = (e) => filterItems(cat.id, e.target);
                nav.appendChild(btn);
            });

            renderMenu(menuData);
        }

        function renderMenu(items) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            items.forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white rounded-3xl p-4 border border-gray-100 shadow-sm flex items-center gap-4 animate-slide-up">
                        <div class="flex-1">
                            <span class="text-[8px] font-black uppercase text-blue-500 bg-blue-50 px-2 py-0.5 rounded-md mb-1 inline-block italic">${item.cat}</span>
                            <h3 class="text-gray-900 font-extrabold text-sm leading-tight mb-1">${item.name}</h3>
                            <p class="text-[10px] text-gray-400 font-medium mb-3 italic line-clamp-1">${item.desc}</p>
                            <div class="flex items-center gap-4">
                                <div>
                                    <p class="text-[8px] text-green-600 font-black uppercase italic leading-none">Efectivo</p>
                                    <p class="text-base font-black text-gray-800 tracking-tighter">$${item.cash.toLocaleString()}</p>
                                </div>
                                <div class="w-px h-6 bg-gray-100"></div>
                                <div>
                                    <p class="text-[8px] text-blue-400 font-black uppercase italic leading-none">Transfer</p>
                                    <p class="text-xs font-bold text-gray-400">$${item.mp.toLocaleString()}</p>
                                </div>
                            </div>
                        </div>
                        <button onclick="handleAddToCart(${item.id})" class="bg-[#1d3557] active:bg-green-500 text-white w-12 h-12 rounded-2xl shadow-lg transition-all active:scale-90 flex items-center justify-center shrink-0">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                `;
            });
        }

        function handleAddToCart(id) {
            const item = menuData.find(i => i.id === id);
            if (item.side) {
                pendingItem = item;
                const grid = document.getElementById('sides-grid');
                grid.innerHTML = '';
                CONFIG.guarniciones.forEach(s => {
                    grid.innerHTML += `<button onclick="selectSide('${s}')" class="w-full py-4 px-6 bg-gray-50 border border-gray-100 rounded-2xl text-left font-bold text-gray-700 active:bg-blue-50 transition-all text-sm">${s}</button>`;
                });
                document.getElementById('side-modal').classList.remove('hidden');
            } else {
                addToCart(item);
            }
        }

        function selectSide(side) {
            addToCart({ ...pendingItem, cartId: Date.now(), selectedSide: side });
            document.getElementById('side-modal').classList.add('hidden');
            pendingItem = null;
        }

        function closeSideModal() { document.getElementById('side-modal').classList.add('hidden'); }

        function addToCart(item) {
            cart.push(item.cartId ? item : { ...item, cartId: Date.now() });
            updateUI();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(i => i.cartId !== cartId);
            updateUI();
            if(cart.length === 0) toggleCartDrawer(false);
        }

        function clearCart() { cart = []; updateUI(); toggleCartDrawer(false); }

        function updateUI() {
            const isTransfer = document.getElementById('pay-transfer').checked;
            const badge = document.getElementById('cart-badge');
            const summary = document.getElementById('cart-summary');
            const totalDisplay = document.getElementById('cart-text-total');
            const drawerTotal = document.getElementById('drawer-total-display');

            const total = cart.reduce((acc, i) => acc + (isTransfer ? i.mp : i.cash), 0);

            if (cart.length > 0) {
                summary.classList.remove('translate-y-32');
                badge.innerText = cart.length;
                totalDisplay.innerText = `$${total.toLocaleString()}`;
                drawerTotal.innerText = `$${total.toLocaleString()}`;
            } else {
                summary.classList.add('translate-y-32');
            }

            const list = document.getElementById('cart-items-list');
            list.innerHTML = '';
            cart.forEach(item => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-xs">${item.name}</h4>
                            ${item.selectedSide ? `<p class="text-[9px] text-blue-500 font-bold uppercase italic mt-0.5">Guarnición: ${item.selectedSide}</p>` : ''}
                            <p class="text-[10px] font-black text-gray-400 mt-1">$${(isTransfer ? item.mp : item.cash).toLocaleString()}</p>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" class="text-gray-300 p-2 active:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
            });
        }

        function toggleCartDrawer(show) {
            const drawer = document.getElementById('cart-drawer');
            const overlay = document.getElementById('cart-drawer-overlay');
            if (show && cart.length > 0) {
                drawer.classList.replace('drawer-closed', 'drawer-open');
                overlay.classList.remove('hidden');
            } else {
                drawer.classList.replace('drawer-open', 'drawer-closed');
                overlay.classList.add('hidden');
            }
        }

        function filterItems(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenu(cat === 'todos' ? menuData : menuData.filter(i => i.cat === cat));
        }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            const isTransfer = document.getElementById('pay-transfer').checked;
            let msg = "*PEDIDO - MAXICOMIDAS*\n----------------------------\n";
            cart.forEach(i => {
                msg += `• *${i.name}* ($${(isTransfer ? i.mp : i.cash).toLocaleString()})\n`;
                if(i.selectedSide) msg += `  _Guarnición: ${i.selectedSide}_\n`;
            });
            const total = cart.reduce((a, b) => a + (isTransfer ? b.mp : b.cash), 0);
            msg += `----------------------------\n✅ *TOTAL: $${total.toLocaleString()}*\n`;
            msg += `💳 *PAGO:* ${isTransfer ? 'Transferencia' : 'Efectivo'}\n\n📍 *Dirección:* \n`;
            window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = initApp;
    </script>
</body>
</html>
